services:
  - type: web
    name: ecourts-scraper
    runtime: docker
    region: oregon
    plan: free

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecourts-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_JOBS
        value: "10"

databases:
  - name: ecourts-db
    plan: free
    region: oregon
