# Netlify configuration for the static frontend.
# Deploy: connect GitHub repo in Netlify dashboard → select this file.
# No build step needed — static/ is published directly.

[build]
  publish = "static"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
