<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Land &rarr; Cases — Maharashtra</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Plotwise</h1>
    <p>One Platform for all the Legal Case Search</p>
  </header>

  <div id="error-banner" class="banner banner-error" style="display:none;">
    <span class="icon">&#9888;</span>
    <span id="error-text"></span>
  </div>

  <div class="card">
    <div class="card-title">Search a survey number</div>
    <form id="land-form" autocomplete="off">
      <div class="form-grid">
        <div class="form-group">
          <label for="district">District</label>
          <select id="district" required>
            <option value="">Loading&hellip;</option>
          </select>
        </div>
        <div class="form-group">
          <label for="taluka">Taluka</label>
          <select id="taluka" required disabled>
            <option value="">Pick a district first</option>
          </select>
        </div>
        <div class="form-group">
          <label for="village">Village</label>
          <select id="village" required disabled>
            <option value="">Pick a taluka first</option>
          </select>
        </div>
        <div class="form-group">
          <label for="survey-part1">Survey base (part 1)</label>
          <input
            id="survey-part1"
            type="text"
            placeholder="e.g. 70"
            required
          />
        </div>
        <div class="form-group">
          <label for="survey-option">Target survey label</label>
          <input
            id="survey-option"
            type="text"
            placeholder="e.g. 70/6"
            required
          />
        </div>
        <div class="form-group">
          <label for="owner-name">Owner name <span class="hint">(optional)</span></label>
          <input
            id="owner-name"
            type="text"
            placeholder="Auto-extracted from 7/12 if blank"
          />
        </div>
        <div class="form-group form-actions">
          <label>&nbsp;</label>
          <button id="submit-btn" class="btn btn-primary" type="submit">
            Run land &rarr; cases
          </button>
        </div>
      </div>
      <p class="form-foot">
        <span id="catalog-meta" class="hint"></span>
        &middot; <a href="_legacy_jobs.html">Legacy eCourts search</a>
      </p>
    </form>
  </div>

  <div id="progress-section" class="card">
    <div class="card-title">
      <span class="spinner"></span>&nbsp; Processing your search&hellip;
    </div>
    <div class="progress-label">
      <span id="progress-status-label">starting</span>
      <span id="progress-pct-label">0%</span>
    </div>
    <div class="progress-track">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <p id="progress-msg" class="progress-msg">Please wait while we process your request.</p>
    <p id="progress-meta" class="progress-msg"></p>
  </div>

  <div id="results-section" class="card">
    <div class="results-header">
      <h2 id="results-title">Due diligence reports</h2>
      <div class="results-actions">
        <button class="btn btn-primary btn-sm" id="reset-btn" type="button">
          + New report
        </button>
      </div>
    </div>

    <!-- New report card rendered here -->
    <div id="report-container"></div>

    <!-- Legacy elements kept for progressive-enhancement fallback; hidden by default -->
    <div id="counts-strip" class="counts-strip" style="display:none;"></div>
    <div id="entity-block" class="entity-block" style="display:none;"></div>
    <div class="table-wrap" style="display:none;">
      <table id="hits-table">
        <thead><tr><th>Loading&hellip;</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="artifacts-block" class="artifacts-block"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
